<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سباق الحروف</title>
    <style>
        :root {
            --hex-width: min(17vw, 75px); 
            --hex-height: calc(var(--hex-width) * 1.1547); 
            --orange: #ea580c;
            --green: #16a34a;
        }
        body {
            background-color: #f97316; margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; overflow: hidden; 
        }
        .bg-wrapper { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250vmax; height: calc(250vmax * 0.8398); background-color: #f97316; z-index: -1; }
        .bg-left, .bg-right { position: absolute; top: 0; bottom: 0; width: 50.1%; background-color: var(--green); }
        .bg-left { left: 0; clip-path: polygon(0 0, 100% 50%, 0 100%); }
        .bg-right { right: 0; clip-path: polygon(100% 0, 100% 100%, 0 50%); }
        
        .board { direction: ltr; display: flex; flex-direction: column; align-items: flex-start; filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.6)); }
        .row { display: flex; margin-top: calc(var(--hex-height) * -0.25); }
        .row:first-child { margin-top: 0; }
        .row:nth-child(even) { margin-left: calc(var(--hex-width) * 0.5); }
        
        .hex { width: var(--hex-width); height: var(--hex-height); background-color: #222; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: -1px; }
        .hex-inner { width: calc(100% - 4px); height: calc(100% - 4px); background-color: white; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .letter { font-size: calc(var(--hex-width) * 0.45); font-weight: 900; color: #111; }
        
        .hex.green .hex-inner { background-color: var(--green); }
        .hex.orange .hex-inner { background-color: var(--orange); }
        .hex.green .letter, .hex.orange .letter { color: white; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; text-align: center; position: relative; }
        .question-text { font-size: 1.3rem; color: #333; margin-bottom: 20px; line-height: 1.6; font-weight: bold; }
        .answer-text { font-size: 1.3rem; color: var(--green); margin-bottom: 20px; display: none; font-weight: bold; background: #f0fdf4; padding: 10px; border-radius: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; margin: 5px; flex: 1; }
        .btn-show { background: #3b82f6; width: calc(100% - 10px); }
        .btn-green { background: var(--green); }
        .btn-orange { background: var(--orange); }
        .btn-cancel { background: #6b7280; width: calc(100% - 10px); }
        .reset-btn { position: fixed; bottom: 15px; background: #fff; padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; z-index: 5; font-size: 12px; }
    </style>
</head>

            </div>
            <button class="btn btn-cancel" onclick="closeModal()">إغلاق</button>

        let currentHex = null;

        function initBoard() {
            // 1. استخراج كل الحروف الموجودة في البنك
            const allLetters = Object.keys(bank);
            
            // 2. خلط الحروف عشوائياً (Fisher-Yates Shuffle)
            for (let i = allLetters.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allLetters[i], allLetters[j]] = [allLetters[j], allLetters[i]];
            }

            // 3. بناء البورد بـ 5 صفوف و5 خانات في كل صف (المجموع 25)
            const rowsCount = 5;
            const colsCount = 5;
            const board = document.getElementById('board');
            board.innerHTML = '';

            let letterIndex = 0;
            for (let r = 0; r < rowsCount; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                for (let c = 0; c < colsCount; c++) {
                    // سحب حرف من القائمة المخلوطة، لو انتهت نرجع من البداية
                    const letter = allLetters[letterIndex % allLetters.length];
                    letterIndex++;

                    const hex = document.createElement('div');
                    hex.className = 'hex';
                    hex.onclick = () => openQuestion(hex, letter);
                    
                    const inner = document.createElement('div');
                    inner.className = 'hex-inner';
                    
                    const span = document.createElement('span');
                    span.className = 'letter';
                    span.innerText = letter;
                    
                    inner.appendChild(span);
                    hex.appendChild(inner);
                    rowDiv.appendChild(hex);
                }
                board.appendChild(rowDiv);
            }
        }

        function openQuestion(hex, letter) {
            currentHex = hex;
            document.getElementById('modal-letter').innerText = letter;
            const qList = bank[letter] || [{q: "سؤال قيد التحضير لهذا الحرف...", a: "لا توجد إجابة"}];
            const qObj = qList[Math.floor(Math.random() * qList.length)];
            document.getElementById('question').innerText = qObj.q;
            document.getElementById('answer').innerText = qObj.a;
            document.getElementById('answer').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function markCell(team) {
            if(currentHex) {
                currentHex.className = 'hex ' + team;
                closeModal();
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function resetBoard() { 
            initBoard(); // إعادة بناء وتوزيع الحروف عشوائياً من جديد
        }
